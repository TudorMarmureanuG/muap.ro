<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <title>Multiapp - Driver Downloads</title>
    <link rel="icon" type="image/png" href="../help/technology.png">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .header {
            background-color: #007db8;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        .search-bar input {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            flex-grow: 1;
        }
        .search-bar button {
            background-color: #007db8;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
        }
        .search-bar button:hover {
            background-color: #005c90;
        }
        .error-message {
            color: red;
            font-size: 0.9em;
            display: none;
        }
        .driver-list {
            margin-top: 20px;
        }
        .driver-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 5px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .driver-item span.tag {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 4px;
        }
        .driver-item .tag.critical {
            background-color: #ffdddd;
            color: #d8000c;
        }
        .driver-item .tag.recommended {
            background-color: #ddffdd;
            color: #4f8a10;
        }
        .driver-item button {
            background-color: #007db8;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .driver-item button:hover {
            background-color: #005c90;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Multiapp - Driver Downloads</h1>
</div>

<div class="container">
    <h2>Access the full list of drivers and downloads</h2>
    
    <div class="search-bar">
        <input id="search-input" type="text" placeholder="Enter Dev Tag" onkeypress="handleKeyPress(event)">
        <button onclick="filterDrivers()">Search</button>
    </div>
    
    <p id="error-message" class="error-message">Please enter a valid 7-character code.</p>
    
    <div class="driver-list" id="driver-list">
    </div>
</div>
