<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <link rel="icon" type="image/png" href="../..help/technology.png">
    <title>Muap - Feedback</title>
    <style>
        *, ::after, ::before {
            box-sizing: border-box;
        }

        body {
            background-color: #212121;
            color: #fff;
            font-family: monospace, serif;
            letter-spacing: 0.05em;
        }

        h1 {
            font-size: 23px;
            text-align: center;
        }

        .form {
            width: 300px;
            padding: 64px 15px 24px;
            margin: 0 auto;
        }

        .form .control {
            margin: 0 0 24px;
        }

        .form .control textarea,
        .form .control input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #00d4ff;
            background: transparent;
            color: #fff;
            font-family: monospace, serif;
            letter-spacing: 0.05em;
            font-size: 16px;
        }

        .form .control textarea {
            resize: none;
            height: 150px; /* Câmp text mai mare */
        }

        .form .control input:hover, .form .control input:focus, 
        .form .control textarea:hover, .form .control textarea:focus {
            outline: none;
            border-color: #ff00ff;
        }

        .form .btn {
            width: 100%;
            display: block;
            padding: 14px 16px;
            background: transparent;
            outline: none;
            border: 0;
            color: #fff;
            letter-spacing: 0.1em;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
        }

        .block-cube {
            position: relative;
        }

        .block-cube .bg-top,
        .block-cube .bg-right,
        .block-cube .bg {
            position: absolute;
            background: #020024;
            background: linear-gradient(90deg, #ccff66 0%, #00ffff 37%, #ff00ff 94%);
            transition: background 0.2s ease-in-out;
        }

        .block-cube .bg-top {
            height: 10px;
            bottom: 100%;
            left: 5px;
            right: -5px;
            transform: skew(-45deg, 0);
        }

        .block-cube .bg-right {
            top: -5px;
            width: 10px;
            left: 100%;
            transform: skew(0, -45deg);
        }

        .block-cube .bg-inner {
            background: #212121;
            position: absolute;
            left: 2px;
            top: 2px;
            right: 2px;
            bottom: 2px;
        }

        .block-cube.block-input input,
        .block-cube.block-input textarea {
            position: relative;
            z-index: 2;
        }

        .block-cube.block-input input:focus ~ .bg-right .bg-inner,
        .block-cube.block-input input:focus ~ .bg-top .bg-inner,
        .block-cube.block-input textarea:focus ~ .bg-right .bg-inner,
        .block-cube.block-input textarea:focus ~ .bg-top .bg-inner {
            top: 100%;
            background: rgba(255, 255, 255, 0.5);
        }

        .credits {
            position: fixed;
            left: 0;
            bottom: 0;
            padding: 15px 15px;
            width: 100%;
            z-index: 111;
        }

        .credits a {
            opacity: 0.6;
            color: #fff;
            font-size: 11px;
            text-decoration: none;
        }

        .credits a:hover {
            opacity: 1;
        }
    </style>
</head>
<body>
    <form autocomplete='off' class='form' id="feedbackForm">
        <div class='control'>
            <h1>Feedback</h1>
        </div>
        <div class='control block-cube block-input'>
            <input id='name' name='name' placeholder='Your Name' type='text' required>
            <div class='bg-top'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg-right'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg'>
                <div class='bg-inner'></div>
            </div>
        </div>
        <div class='control block-cube block-input'>
            <textarea id='feedback' name='feedback' placeholder='Your Feedback' required></textarea>
            <div class='bg-top'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg-right'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg'>
                <div class='bg-inner'></div>
            </div>
        </div>
        <button id="submitButton" class='btn block-cube block-cube-hover' type='button'>
            <div class='bg-top'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg-right'>
                <div class='bg-inner'></div>
            </div>
            <div class='bg'>
                <div class='bg-inner'></div>
            </div>
            <div class='text'>Submit</div>
        </button>
    </form>
