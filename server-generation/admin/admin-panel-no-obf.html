<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <link rel="icon" type="image/png" href="../../help/technology.png">
    <title>Muap - Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .login-container, .dashboard {
            width: 90%;
            max-width: 1200px;
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 1s ease-out;
        }
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .login-container input {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .login-container button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #9a4ef2;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 16px;
        }
        .login-container button:hover {
            color: black;
            background-color: #00e5ff;
        }
        .dashboard {
            display: none;
        }
        .card {
            background-color: #2c2c2c;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
        }
        .chart {
            position: relative;
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }
        .circular-progress {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }
        .circular-progress svg {
            transform: rotate(-90deg);
        }
        .circular-progress circle {
            fill: none;
            stroke-width: 10;
        }
        .circular-progress .background {
            stroke: #333;
        }
        .circular-progress .progress {
            stroke: aqua;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s;
        }
        .circular-progress .text {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            position: absolute;
            text-align: center;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Log In</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Sales Overview</h2>
            <canvas id="lineChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Disk Usage</h2>
            <div class="circular-progress">
                <svg width="150" height="150">
                    <circle class="background" cx="75" cy="75" r="70"/>
                    <circle class="progress" cx="75" cy="75" r="70"/>
                </svg>
                <div class="text">415GB / 960GB</div>
            </div>
        </div>
        <div class="card">
            <h2>Product Types</h2>
            <canvas id="barChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>User Engagement</h2>
            <canvas id="doughnutChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Monthly Traffic</h2>
            <canvas id="radarChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Active Users</h2>
            <canvas id="pieChart" class="chart"></canvas>
        </div>
        <a style="color: #ccff66;" href="../admin/Tudor-Marmureanu/tudor-marmureanu-public-dashboard.html"><b>My dashboard</b></a>
    </div>

    <script src="chart.js"></script> <!-- https://cdn.jsdelivr.net/npm/chart.js -->
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (username === 'admin' && password === '*****') {
                document.querySelector('.login-container').style.display = 'none';
                document.querySelector('.dashboard').style.display = 'grid';
                initializeCharts();
            } else {
                alert('Invalid username or password');
            }
        }

        function initializeCharts() {
            const salesData = [
                3, 0, 7, 8, 6, 5, 0, 0, 9, 4, 
                5, 6, 0, 7, 8, 0, 9, 2, 5, 0, 
                8, 6, 7, 0, 4, 9, 0, 10, 3, 2, 
                0, 6, 0, 5, 7, 8, 4, 0, 9, 0, 
                3, 0, 6, 7, 0, 8, 5, 0, 9, 2, 
                0, 6, 7, 0, 5, 0, 8, 4, 9, 0, 
                3, 6, 0, 5, 7, 0, 8, 4, 9, 0, 
                6, 0, 5, 8, 7, 0, 4, 7, 2, 5,
                0, 0, 3, 1, 17, 6, 0, 0, 0, 0,
                0, 0, 0, 13, 0, 0, 0, 0, 0, 0,
                0, 8, 0, 0, 16
            ];
            
            const productTypesData = [103, 49, 7];
            const userEngagementData = [150, 23, 9];
            const monthlyTrafficData = [80, 50, 60, 90, 100];
            const activeUsersData = [150, 9];

            const lineCtx = document.getElementById('lineChart').getContext('2d');
        new Chart(lineCtx, {
            type: 'line',
            data: {
                labels: Array(salesData.length).fill(''),
                datasets: [{
                    label: 'Sales - 12 July to Present',
                    data: salesData,
                    borderColor: '#e066ff',
                    backgroundColor: 'rgba(98, 0, 234, 0.2)',
                    borderWidth: 2,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { labels: { color: '#e0e0e0' } }
                },
                scales: {
                    x: { 
                        ticks: { display: false },
                        grid: { display: false }
                    },
                    y: { 
                        ticks: { 
                            color: '#e0e0e0',
                            stepSize: 1 // Set step size to 1 to show every value between ticks
                        }, 
                        grid: { color: '#333' }
                    }
                }
            }
        });

            const barCtx = document.getElementById('barChart').getContext('2d');
            new Chart(barCtx, {
                type: 'bar',
                data: {
                    labels: ['Enterprise', 'Premium', 'Standard'],
                    datasets: [{
                        label: 'Product Types',
                        data: productTypesData,
                        backgroundColor: ['#6200ea', '#03dac5', '#ff5722'],
                        borderColor: '#333',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } }
                    },
                    scales: {
                        x: { ticks: { color: '#e0e0e0' }, grid: { color: '#333' } },
                        y: { ticks: { color: '#e0e0e0' }, grid: { color: '#333' } }
                    }
                }
            });

            const doughnutCtx = document.getElementById('doughnutChart').getContext('2d');
            new Chart(doughnutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['Total Activated Licenses', 'Reactivated Licenses', 'Deactivated Licenses'],
                    datasets: [{
                        label: 'User Engagement',
                        data: userEngagementData,
                        backgroundColor: ['#6200ea', '#03dac5','#ff5722'],
                        borderColor: '#333',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } }
                    }
                }
            });

            const radarCtx = document.getElementById('radarChart').getContext('2d');
            new Chart(radarCtx, {
                type: 'radar',
                data: {
                    labels: ['July', 'August', 'September'],
                    datasets: [{
                        label: 'Traffic',
                        data: monthlyTrafficData,
                        backgroundColor: 'rgba(98, 0, 234, 0.2)',
                        borderColor: '#6200ea',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } }
                    },
                    scales: {
                        r: { ticks: { color: '#e0e0e0' }, grid: { color: '#333' } }
                    }
                }
            });

            const pieCtx = document.getElementById('pieChart').getContext('2d');
            new Chart(pieCtx, {
                type: 'pie',
                data: {
                    labels: ['Active', 'Inactive'],
                    datasets: [{
                        label: 'Active Users',
                        data: activeUsersData,
                        backgroundColor: ['#6200ea', '#ff5722'],
                        borderColor: '#333',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { labels: { color: '#e0e0e0' } }
                    }
                }
            });

            function updateDiskUsage(used, total) {
                const percentage = (used / total) * 100;
                const radius = 70;
                const circumference = 2 * Math.PI * radius;
                const offset = circumference * (1 - (percentage / 100));

                document.querySelector('.circular-progress .progress').style.strokeDasharray = `${circumference}px ${circumference}px`;
                document.querySelector('.circular-progress .progress').style.strokeDashoffset = `${offset}px`;
            }

            updateDiskUsage(415, 960);
        }

        document.getElementById('username').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                login();
            }
        });
        document.getElementById('password').addEventListener('keydown', function(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                login();
            }
        });
    </script>
</body>
</html>
