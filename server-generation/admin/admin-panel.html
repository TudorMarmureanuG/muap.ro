
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <link rel="icon" type="image/png" href="../../help/technology.png">
    <title>Muap - Admin Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .login-container, .dashboard {
            width: 90%;
            max-width: 1200px;
            background-color: #1e1e1e;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            animation: fadeIn 1s ease-out;
        }
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .login-container input {
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 5px;
            background-color: #2c2c2c;
            color: #e0e0e0;
        }
        .login-container button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #9a4ef2;
            color: #e0e0e0;
            cursor: pointer;
            font-size: 16px;
        }
        .login-container button:hover {
            color: black;
            background-color: #00e5ff;
        }
        .dashboard {
            display: none;
        }
        .card {
            background-color: #2c2c2c;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
        }
        .card h2 {
            margin-top: 0;
            font-size: 18px;
        }
        .chart {
            position: relative;
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }
        .circular-progress {
            position: relative;
            width: 150px;
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
        }
        .circular-progress svg {
            transform: rotate(-90deg);
        }
        .circular-progress circle {
            fill: none;
            stroke-width: 10;
        }
        .circular-progress .background {
            stroke: #333;
        }
        .circular-progress .progress {
            stroke: aqua;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s;
        }
        .circular-progress .text {
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            position: absolute;
            text-align: center;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Log In</button>
    </div>

    <div class="dashboard">
        <div class="card">
            <h2>Sales Overview</h2>
            <canvas id="lineChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Disk Usage</h2>
            <div class="circular-progress">
                <svg width="150" height="150">
                    <circle class="background" cx="75" cy="75" r="70"/>
                    <circle class="progress" cx="75" cy="75" r="70"/>
                </svg>
                <div class="text">415GB / 960GB</div>
            </div>
        </div>
        <div class="card">
            <h2>Product Types</h2>
            <canvas id="barChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>User Engagement</h2>
            <canvas id="doughnutChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Monthly Traffic</h2>
            <canvas id="radarChart" class="chart"></canvas>
        </div>
        <div class="card">
            <h2>Active Users</h2>
            <canvas id="pieChart" class="chart"></canvas>
        </div>
        <a style="color: #ccff66;" href="../admin/Tudor-Marmureanu/tudor-marmureanu-public-dashboard.html"><b>My dashboard</b></a>
    </div>
