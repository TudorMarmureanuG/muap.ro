<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1024">
    <link rel="icon" type="image/png" href="help/technology.png">
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

* {
  box-sizing: border-box;
}

body {
  background-color: #222;
  color: #ccff66;
  font-family: 'Roboto', sans-serif;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0;
  overflow-x: hidden;
}

h1 {
  margin: 10px;
}

.box {
  background-color: #121212;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 400px;
  height: 200px;
  margin: 10px;
  border-radius: 10px;
  box-shadow: 2px 4px 5px rgba(0, 0, 0, 0.3);
  transform: translateX(400%);
  transition: transform 0.4s ease;
}

.box:nth-of-type(even) {
  transform: translateX(-400%);
}

.box.show {
  transform: translateX(0);
}

.box h2 {
  font-size: 45px;
}
    </style>
    <title>Multiapp short intro</title>
  </head>
  <body>
    <h1>Multiapp short intro</h1><br>
    <div class="box"><h2>IT Top Solution</h2></div>
    <div class="box"><h2>Fast</h2></div>
    <div class="box"><h2>Secure</h2></div>
    <div class="box"><h2>Compact</h2></div>
    <div class="box"><h2>Intuitive</h2></div>
    <div class="box"><h2>Simple</h2></div>
    <div class="box"><h2>Powerfull</h2></div>
    <div class="box"><h2>Organized</h2></div>
    <div class="box"><h2>Efficient</h2></div>
    <div class="box"><h2>Automated</h2></div>
    <div class="box"><h2>Innovation</h2></div>
    <script>
        const boxes = document.querySelectorAll('.box')

window.addEventListener('scroll', checkBoxes)

checkBoxes()

function checkBoxes() {
    const triggerBottom = window.innerHeight / 5 * 4

    boxes.forEach(box => {
        const boxTop = box.getBoundingClientRect().top

        if(boxTop < triggerBottom) {
            box.classList.add('show')
        } else {
            box.classList.remove('show')
        }
    })
}
    </script>
  </body>
</html>
