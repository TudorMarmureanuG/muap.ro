<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1024">
    <link rel="icon" type="image/png" href="../help/technology.png">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Muli:300,700&display=swap');

* {
  box-sizing: border-box;
}

body {
  background-color: #222;
  font-family: 'Muli', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  margin: 0;
}

.container {
  background-color: #121212;
  border: 3px #FF00FF solid;
  border-radius: 10px;
  padding: 30px;
  max-width: 1000px;
  text-align: center;
  color: #ccff66;
}

.code-container {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 40px 0;
}

.code {
  background-color: #222;
  color: aqua;
  caret-color: transparent;
  border-radius: 5px;
  font-size: 75px;
  height: 120px;
  width: 100px;
  border: 1px solid aqua;
  margin: 5px;
  text-align: center;
  font-weight: 300;
  -moz-appearance: textfield;
}

.code::-webkit-outer-spin-button,
.code::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

.code:valid {
  border-color: aqua;
  box-shadow: 0 0 30px #00FFFF, 0 0 20px #FF00FF;
}

.info {
  background-color: #222;
  display: inline-block;
  padding: 10px;
  line-height: 20px;
  max-width: 400px;
  color: #777;
  border-radius: 5px;
}

@media (max-width: 600px) {
  .code-container {
    flex-wrap: wrap;
  }

  .code {
    font-size: 60px;
    height: 80px;
    max-width: 70px;
  }
}
    </style>
    <title>Verify Dev Code</title>
  </head>
  <body>
    <div class="container">
      <h2>Claim your product key.</h2>
      <p>Please enter the Developer code first. (Sent via email.)<br/>By entering this 6-digit numeric code, the requested license key will be displayed.</p>
      <div class="code-container">
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
        <input type="number" class="code" placeholder="0" min="0" max="9" required>
      </div>
      <small class="info" id="info">
        Your product key will be displayed here.
      </small>
    </div>
    <script>
            const codes = document.querySelectorAll('.code');
    const codeLicensePairs = {
        '794551': 'NO67B-REG4W-A26PR-LS1F1-DRM67',
        '444136': 'AF67B-JHYWJ-QG90R-LD3FG-KM6Q1',
        '582091': 'TP0KB-RE34R-ADR7P-OJ9LS-F7KHY',
        '137110': 'R46BX-JHR2J-PG7ER-24QFG-MWKVR'
    };

    codes[0].focus();

    codes.forEach((code, idx) => {
        // Mutare automată la următoarea casetă după introducerea unei cifre
        code.addEventListener('input', () => {
            if (code.value.length === 1 && codes[idx + 1]) {
                codes[idx + 1].focus();
            }
        });

        // Navigare înapoi cu Backspace
        code.addEventListener('keydown', (e) => {
            if (e.key === 'Backspace' && codes[idx - 1]) {
                setTimeout(() => {
                    codes[idx - 1].focus();
                }, 10);
            }
        });
    });

    // Verificare cod introdus și afișare licență
    document.addEventListener('keyup', () => {
        let inputCode = '';
        codes.forEach(code => {
            inputCode += code.value;
        });

        const infoElement = document.getElementById('info');

        if (codeLicensePairs[inputCode]) {
            infoElement.textContent = `License Key: ${codeLicensePairs[inputCode]}`;
            infoElement.style.color = 'lime';
        } else {
            infoElement.textContent = 'Your product key will be displayed here.';
            infoElement.style.color = '#777';
        }
    });
    </script>
  </body>
</html>
