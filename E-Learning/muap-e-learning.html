<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muap - E-Learning Platform</title>
    <link rel="icon" type="image/png" href="../help/technology.png">
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Dark background */
            color: #FFFFFF; /* White text for contrast */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            color: aqua;
        }

        a:hover {
            color: #f005fd;
        }

        /* Header Styling */
        header {
            background-color: #1E1E1E; /* Slightly lighter than body */
            color: #FFA500; /* Orange text */
            padding: 1.5rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 {
            font-size: 2rem;
        }

        /* Container for Sidebar and Main Content */
        .container {
            display: flex;
            flex: 1;
        }

        /* Sidebar Styling */
        aside {
            width: 250px;
            background-color: #1E1E1E; /* Dark sidebar */
            color: #FFA500; /* Orange text */
            padding: 1rem;
            overflow-y: auto;
            height: calc(100vh - 80px); /* Adjust based on header height */
            position: sticky;
            top: 80px; /* Header height */
        }

        aside h2 {
            margin-bottom: 1rem;
            font-size: 1.2rem;
            border-bottom: 1px solid #FFA500; /* Orange underline */
            padding-bottom: 0.5rem;
        }

        aside ul {
            list-style: none;
        }

        aside li {
            margin-bottom: 0.5rem;
        }

        aside a {
            color: #FFA500; /* Orange links */
            text-decoration: none;
            display: block;
            padding: 0.5rem;
            border-radius: 4px;
            transition: background-color 0.3s, color 0.3s;
        }

        aside a:hover, aside a.active {
            background-color: #333333; /* Dark hover background */
            color: #FFFFFF; /* White text on hover */
        }

        /* Main Content Styling */
        main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            height: calc(100vh - 80px);
            background-color: #1A1A1A; /* Dark main content background */
        }

        main h2 {
            margin-bottom: 1rem;
            color: #FFA500; /* Orange headings */
        }

        .lesson-content img {
            max-width: 100%;
            height: auto;
            margin: 1rem 0;
        }

        .code-snippet {
            background-color: #333333; /* Dark code block background */
            padding: 1rem;
            border-left: 4px solid #FFA500; /* Orange border */
            overflow-x: auto;
            margin: 1rem 0;
            border-radius: 4px;
        }

        /* Footer Styling */
        footer {
            background-color: #1E1E1E; /* Dark footer */
            color: #FFA500; /* Orange text */
            text-align: center;
            padding: 1rem;
            position: relative;
        }

        /* Modal Styling */
        .modal {
            display: none; /* Hidden by default */
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.8); /* Dark semi-transparent background */
        }

        .modal-content {
            background-color: #2C2C2C; /* Solid dark background */
            margin: 5% auto; /* Center vertically and horizontally */
            padding: 2rem;
            border: 2px solid #FFA500; /* Orange border */
            width: 90%;
            max-width: 600px;
            border-radius: 8px;
            position: relative;
        }

        .close {
            color: #FFA500; /* Orange close button */
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: #FFFFFF; /* White on hover */
        }

        /* Quiz and Assignment Styling */
        .quiz-question, .assignment {
            margin-bottom: 1.5rem;
        }

        .quiz-question p, .assignment p {
            margin-bottom: 0.5rem;
            color: #FFFFFF; /* White text */
        }

        .quiz-question label, .assignment label {
            display: block;
            margin-bottom: 0.3rem;
            color: #FFFFFF; /* White text */
        }

        button {
            padding: 0.5rem 1rem;
            background-color: #FFA500; /* Orange buttons */
            color: #1E1E1E; /* Dark text */
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            margin-top: 0.5rem;
            margin-right: 0.5rem;
        }

        button:hover {
            background-color: #FF8C00; /* Darker orange on hover */
            color: #FFFFFF; /* White text on hover */
        }

        pre {
            background-color: #333333; /* Dark code block background */
            padding: 1rem;
            border-radius: 4px;
            overflow-x: auto;
            color: #FFFFFF; /* White text */
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            aside {
                width: 100%;
                height: auto;
                position: relative;
                top: 0;
            }

            main {
                height: auto;
            }

            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
    </style>

</head>

    a++;

// Pass by pointer
void incrementPtr(int *a) {

                <p>Smart pointers are objects that manage the lifetime of dynamically allocated memory, ensuring proper deallocation and preventing memory leaks.</p>
                <p><strong>Types of Smart Pointers:</strong></p>
                <ul>
                    <li><strong>std::unique_ptr:</strong> Exclusive ownership of the memory.</li>
                    <li><strong>std::shared_ptr:</strong> Shared ownership with reference counting.</li>
                    <li><strong>std::weak_ptr:</strong> Weak reference to avoid circular dependencies.</li>
                </ul>
                <p><strong>Example using std::unique_ptr:</strong></p>
                <div class="code-snippet">
                    <pre><code>#include &lt;iostream&gt;
        #include &lt;memory&gt;

        int main() {
            // Creating a unique_ptr
            std::unique_ptr<int> ptr = std::make_unique<int>(100);
            std::cout << "Value: " << *ptr << std::endl;

            // Transfer ownership to another unique_ptr
            std::unique_ptr<int> ptr2 = std::move(ptr);
            if(!ptr) {
                std::cout << "ptr is now null after moving to ptr2." << std::endl;
            }
            std::cout << "Value via ptr2: " << *ptr2 << std::endl;

            // unique_ptr cannot be copied, the following line would cause a compile-time error

            std::cout << "Value: " << *sptr1 << std::endl;

            // Creating another shared_ptr sharing the same memory

        // Function to Initialize Navigation Sidebar
        function setupNavigation() {
            const nav = document.querySelector('aside ul');
            nav.innerHTML = '';

            Object.keys(courses).forEach(courseKey => {
                const course = courses[courseKey];
                const li = document.createElement('li');
                const a = document.createElement('a');
                a.href = '#';
                a.textContent = course.title;
                a.addEventListener('click', (e) => {
                    e.preventDefault();
                    setActiveLink(a);
                    loadCourse(courseKey);
                });
                li.appendChild(a);
                nav.appendChild(li);
            });
        }

        // Function to Set Active Link in Navigation
        function setActiveLink(activeLink) {
            const links = document.querySelectorAll('aside a');
            links.forEach(link => link.classList.remove('active'));
            activeLink.classList.add('active');
        }

        // Function to Load Selected Course
        function loadCourse(courseKey) {
            const course = courses[courseKey];
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>${course.title} Course</h2>
                <p>${course.description}</p>
                <div class="modules">
                    <h3>Modules</h3>
                    <ul>
                        ${course.modules.map((module, index) => `
                            <li>
                                <a href="#" onclick="loadModule('${courseKey}', ${index})">${module.title}</a>
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }

        // Function to Load Selected Module
        function loadModule(courseKey, moduleIndex) {
            const course = courses[courseKey];
            const module = course.modules[moduleIndex];
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>${course.title} - ${module.title}</h2>
                <div class="lessons">
                    <h3>Lessons</h3>
                    <ul>
                        ${module.lessons.map((lesson, index) => {
                            const lessonKey = `${moduleIndex}-${index}`;
                            const isCompleted = course.progress.completedLessons.includes(lessonKey) ? '✔️' : '';
                            return `
                                <li>
                                    <a href="#" onclick="loadLesson('${courseKey}', ${moduleIndex}, ${index})">${lesson.title}</a> ${isCompleted}
                                </li>
                            `;
                        }).join('')}
                    </ul>
                </div>
                <div class="module-activities">
                    <button onclick="openQuiz('${courseKey}', ${moduleIndex})">Take Module Quiz</button>
                    <button onclick="openAssignment('${courseKey}', ${moduleIndex})">View Module Assignments</button>
                </div>
            `;
        }

        // Function to Load Selected Lesson
        function loadLesson(courseKey, moduleIndex, lessonIndex) {
            const course = courses[courseKey];
            const lesson = course.modules[moduleIndex].lessons[lessonIndex];
            const content = document.getElementById('content');
            content.innerHTML = `
                <h2>${course.title} - ${lesson.title}</h2>
                <div class="lesson-content">
                    ${lesson.content}
                </div>
                <button onclick="markLessonComplete('${courseKey}', '${moduleIndex}-${lessonIndex}')">Mark as Complete</button>
                <div class="lesson-activities">
                    <button onclick="openQuiz('${courseKey}', ${moduleIndex})">Take Module Quiz</button>
                    <button onclick="openAssignment('${courseKey}', ${moduleIndex})">View Module Assignments</button>
                </div>
            `;
        }

        // Function to Mark Lesson as Complete
        function markLessonComplete(courseKey, lessonKey) {
            const course = courses[courseKey];
            if (!course.progress.completedLessons.includes(lessonKey)) {
                course.progress.completedLessons.push(lessonKey);
                localStorage.setItem(courseKey, JSON.stringify(course.progress));
                alert('Lesson marked as complete!');
                // Refresh current view to update completion status
                const activeLink = document.querySelector('aside a.active');
                if (activeLink) {
                    const currentCourseKey = Object.keys(courses).find(key => courses[key].title === activeLink.textContent);
                    loadCourse(currentCourseKey);
                }
            } else {
                alert('Lesson already marked as complete.');
            }
        }

        // Function to Open Quiz Modal
        function openQuiz(courseKey, moduleIndex) {
            const course = courses[courseKey];
            const module = course.modules[moduleIndex];
            const modal = document.getElementById('modal');
            const modalContent = `
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>${course.title} - ${module.title} Quiz</h2>
                <form id="quizForm">
                    ${module.quizzes.map((quiz, index) => `
                        <div class="quiz-question">
                            <p>${index + 1}. ${quiz.question}</p>
                            ${quiz.options.map(option => `
                                <label>
                                    <input type="radio" name="question${index}" value="${option}" required>
                                    ${option}
                                </label>
                            `).join('')}
                        </div>
                    `).join('')}
                    <button type="submit">Submit Quiz</button>
                </form>
                <div id="quizResult"></div>
            `;
            modal.querySelector('.modal-content').innerHTML = modalContent;
            modal.style.display = 'block';

            // Add Event Listener for Quiz Submission
            document.getElementById('quizForm').addEventListener('submit', function(e) {
                e.preventDefault();
                let score = 0;
                module.quizzes.forEach((quiz, index) => {
                    const selected = document.querySelector(`input[name="question${index}"]:checked`);
                    if (selected && selected.value === quiz.answer) {
                        score++;
                    }
                });
                course.progress.quizScores.push(score);
                localStorage.setItem(courseKey, JSON.stringify(course.progress));
                document.getElementById('quizResult').innerHTML = `<p style="color: #FFA500;">You scored ${score} out of ${module.quizzes.length}</p>`;
            });
        }

        // Function to Open Assignment Modal
        function openAssignment(courseKey, moduleIndex) {
            const course = courses[courseKey];
            const module = course.modules[moduleIndex];
            const modal = document.getElementById('modal');
            const assignments = module.assignments;
            if (!assignments || assignments.length === 0) {
                alert('No assignments available for this module.');
                return;
            }
            let modalContent = `
                <span class="close" onclick="closeModal()">&times;</span>
                <h2>${course.title} - ${module.title} Assignments</h2>
                ${assignments.map((assignment, index) => `
                    <div class="assignment">
                        <h3>${index + 1}. ${assignment.title}</h3>
                        <p>${assignment.description}</p>
                        <textarea id="assignment${moduleIndex}-${index}" rows="10" cols="50">${assignment.codeTemplate}</textarea><br>
                        <button onclick="submitAssignment('${courseKey}', ${moduleIndex}, ${index})">Submit Assignment</button>
                        <pre id="assignmentResult${moduleIndex}-${index}"></pre>
                    </div>
                `).join('')}
            `;
            modal.querySelector('.modal-content').innerHTML = modalContent;
            modal.style.display = 'block';
        }

        // Function to Submit Assignment
        function submitAssignment(courseKey, moduleIndex, assignmentIndex) {
            const course = courses[courseKey];
            const module = course.modules[moduleIndex];
            const assignment = module.assignments[assignmentIndex];
            const userCode = document.getElementById(`assignment${moduleIndex}-${assignmentIndex}`).value.trim();
            const resultElement = document.getElementById(`assignmentResult${moduleIndex}-${assignmentIndex}`);

            // Simple Validation: Check if user code matches the solution
            if (userCode === assignment.solution) {
                if (!module.progress || !module.progress.completedAssignments) {
                    module.progress = module.progress || {};
                    module.progress.completedAssignments = [];
                }
                if (!module.progress.completedAssignments.includes(assignmentIndex)) {
                    module.progress.completedAssignments.push(assignmentIndex);
                    localStorage.setItem(courseKey, JSON.stringify(course.progress));
                    resultElement.innerHTML = `<p style="color: #FFA500;">Assignment submitted successfully!</p>`;
                } else {
                    resultElement.innerHTML = `<p style="color: #FFFFFF;">Assignment already submitted.</p>`;
                }
            } else {
                resultElement.innerHTML = `<p style="color: #FF4500;">Incorrect solution. Please try again.</p>`;
            }
        }

        // Function to Close Modal
        function closeModal() {
            const modal = document.getElementById('modal');
            modal.style.display = 'none';
        }

        // Function to Load Progress from localStorage
        function loadProgress() {
            Object.keys(courses).forEach(courseKey => {
                const savedProgress = JSON.parse(localStorage.getItem(courseKey));
                if (savedProgress) {
                    courses[courseKey].progress = savedProgress;
                }
            });
        }

        // Initialize Platform on Page Load
        document.addEventListener('DOMContentLoaded', () => {
            loadProgress();
            setupNavigation();
        });

        // Close modal when clicking outside of modal content
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
